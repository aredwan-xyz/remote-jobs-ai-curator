name: Daily Remote AI Jobs

on:
  schedule:
    - cron: '0 7 * * *'  # every day at 7am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch remote AI jobs
        run: python fetch_jobs.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs/ README.md ARCHIVE.md
          git diff --cached --quiet || git commit -m "daily jobs: $(date +%Y-%m-%d)"
          git push
